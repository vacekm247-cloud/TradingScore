<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Trading Score - Výsledek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

    <div class="container mt-5">
        <h1 class="text-center mb-4">📊 Výsledek analýzy</h1>

        <div class="card bg-secondary text-white p-4 text-center">

            <h3>Symbol: {{ symbol }}</h3>

            <!-- Skóre -->
            <div class="my-4">
                <h1 class="display-1 fw-bold text-{{ barva }}">{{ skore }}</h1>
                <h5>bodů z 100</h5>
            </div>

            <!-- Progress bar -->
            <div class="progress mb-4" style="height: 30px;">
                <div class="progress-bar bg-{{ barva }}" 
                     style="width: {{ skore }}%">
                    {{ skore }}%
                </div>
            </div>

            <!-- Hodnocení -->
            <h4 class="text-{{ barva }}">{{ hodnoceni }}</h4>

        </div>

        <!-- Tlačítko zpět -->
        <div class="text-center mt-4">
            <a href="/" class="btn btn-outline-light">
                ← Zpět na analýzu
            </a>
        </div>

    </div>

</body>
</html>
