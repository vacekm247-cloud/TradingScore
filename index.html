<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Trading Score</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

    <div class="container mt-5">
        <h1 class="text-center mb-4">📊 Trading Score</h1>

        <div class="card bg-secondary text-white p-4">
            <h4>Zadej parametry signálu</h4>
            <form action="/score" method="POST">

                <!-- Symbol -->
                <div class="mb-3">
                    <label>Symbol</label>
                    <select name="symbol" class="form-select bg-dark text-white">
                        <option>USOIL</option>
                        <option>XAUUSD</option>
                        <option>NASDAQ</option>
                        <option>CORN</option>
                        <option>COFFEE</option>
                    </select>
                </div>

                <!-- Pin Bar -->
                <div class="mb-3">
                    <label>Pin Bar detekován?</label>
                    <select name="pinbar" class="form-select bg-dark text-white">
                        <option value="1">Ano</option>
                        <option value="0">Ne</option>
                    </select>
                </div>

                <!-- Trend -->
                <div class="mb-3">
                    <label>Trend (W1)</label>
                    <select name="trend" class="form-select bg-dark text-white">
                        <option value="1">Bullish</option>
                        <option value="-1">Bearish</option>
                        <option value="0">Neurčitý</option>
                    </select>
                </div>

                <!-- COT -->
                <div class="mb-3">
                    <label>COT signál</label>
                    <select name="cot" class="form-select bg-dark text-white">
                        <option value="1">Bullish</option>
                        <option value="-1">Bearish</option>
                        <option value="0">Neutrální</option>
                    </select>
                </div>

                <!-- Sezónnost -->
                <div class="mb-3">
                    <label>Sezónnost</label>
                    <select name="sezonnost" class="form-select bg-dark text-white">
                        <option value="1">Podporuje směr</option>
                        <option value="0">Neutrální</option>
                        <option value="-1">Proti směru</option>
                    </select>
                </div>

                <!-- Ekonomický kalendář -->
                <div class="mb-3">
                    <label>Ekonomický kalendář</label>
                    <select name="kalendar" class="form-select bg-dark text-white">
                        <option value="1">Žádné rizikové zprávy</option>
                        <option value="0">Menší zprávy</option>
                        <option value="-1">Vysoké riziko (NFP, FED...)</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success w-100 mt-3">
                    Vypočítat skóre 📊
                </button>

            </form>
        </div>
    </div>

</body>
</html>
