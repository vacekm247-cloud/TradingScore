<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Trading Score</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

    <div class="container mt-5">
        <h1 class="text-center mb-4">📊 Trading Score</h1>

        {% if mt4_signal %}
        <div class="alert alert-info text-center mb-4">
            📡 MT4 signál: <strong>{{ mt4_signal }}</strong>
            {% if mt4_cas %} | Čas: {{ mt4_cas }} {% endif %}
        </div>
        {% endif %}

        <div class="card bg-secondary text-white p-4">
            <h4>Zadej parametry signálu</h4>
            <form action="/score" method="POST">

                <!-- Symbol -->
                <div class="mb-3">
                    <label>Symbol</label>
                    <select name="symbol" class="form-select bg-dark text-white">
                        <option>USOIL</option>
                        <option>XAUUSD</option>
                        <option>NASDAQ</option>
                        <option>CORN</option>
                        <option>COFFEE</option>
                        <option>US500</option>
                    </select>
                </div>

                <!-- Info -->
                <div class="alert alert-info mt-3">
                    🤖 Pin Bar, Trend, COT, Sezónnost a Kalendář se načtou automaticky!
                </div>

                <button type="submit" class="btn btn-success w-100 mt-2">
                    Vypočítat skóre 📊
                </button>

            </form>
        </div>
    </div>

</body>
</html>
